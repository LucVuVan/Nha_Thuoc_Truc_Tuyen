<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sản phẩm & Kho – NhàThuốc+</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../../css/base/global.css"/>
  <link rel="stylesheet" href="../../css/components/badges.css"/>
  <link rel="stylesheet" href="../../css/components/buttons.css"/>
  <link rel="stylesheet" href="../../css/components/cards.css"/>
  <link rel="stylesheet" href="../../css/components/forms.css"/>
  <link rel="stylesheet" href="../../css/layout/admin.css"/>
  <script src="../../js/admin/admin-auth.js"></script>
</head>
<body>

  <div id="sidebar-placeholder"></div>

  <main class="admin-main">
    <div class="page-body">

      <div class="page-header-row">
        <div class="page-header">
          <h1>Sản phẩm & Kho</h1>
          <p>Quản lý danh mục thuốc và tồn kho</p>
        </div>
        <div class="page-header__actions">
          <button class="btn btn-primary" onclick="openModal()"><i class="fa-solid fa-plus"></i> Thêm sản phẩm mới</button>
        </div>
      </div>

      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-card__top">
            <span class="stat-card__label">Tổng sản phẩm</span>
            <div class="stat-card__icon green"><i class="fa-solid fa-box-open"></i></div>
          </div>
          <div class="stat-card__value">1,247</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__top">
            <span class="stat-card__label">Sắp hết hàng</span>
            <div class="stat-card__icon orange"><i class="fa-solid fa-triangle-exclamation"></i></div>
          </div>
          <div class="stat-card__value">23</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__top">
            <span class="stat-card__label">Sắp hết hạn</span>
            <div class="stat-card__icon red"><i class="fa-solid fa-clock"></i></div>
          </div>
          <div class="stat-card__value">12</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__top">
            <span class="stat-card__label">Nhà cung cấp</span>
            <div class="stat-card__icon blue"><i class="fa-solid fa-truck"></i></div>
          </div>
          <div class="stat-card__value">156</div>
        </div>
      </div>

      <div class="table-card" style="margin-bottom:0">
        <div style="padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px;">
          <div class="search-bar" style="max-width:480px; border-radius:var(--radius-md);">
            <span class="search-bar__icon"><i class="fa-solid fa-magnifying-glass"></i></span>
            <input type="text" placeholder="Tìm kiếm theo tên thuốc, mã sản phẩm..." id="searchInput" oninput="filterTable()"/>
          </div>
          <button class="btn btn-ghost btn-sm"><i class="fa-solid fa-filter"></i> Lọc</button>
        </div>

        <div style="padding:12px 20px; border-bottom:1px solid var(--border); display:flex; gap:8px;">
          <button class="filter-tab active" onclick="setTab(this,'all')">Tất cả</button>
          <button class="filter-tab" onclick="setTab(this,'in')">Còn hàng</button>
          <button class="filter-tab" onclick="setTab(this,'low')">Sắp hết</button>
          <button class="filter-tab" onclick="setTab(this,'out')">Hết hàng</button>
        </div>

        <table class="data-table" id="productTable">
          <thead>
            <tr>
              <th>Mã SP</th>
              <th>Tên sản phẩm</th>
              <th>Danh mục</th>
              <th>Tồn kho</th>
              <th>Giá bán</th>
              <th>HSD</th>
              <th>Trạng thái</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            </tbody>
        </table>

        <div style="padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);">
          <span id="tableCount" style="font-size:0.82rem;color:var(--text-muted)"></span>
          <div id="paginationEl" style="display:flex;gap:6px;"></div>
        </div>
      </div>

    </div>
  </main>

  <div id="productModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#fff; width:550px; max-width:90%; border-radius:var(--radius-lg); padding:24px; position:relative; box-shadow:var(--shadow-lg);">
      <button onclick="closeModal()" style="position:absolute; top:16px; right:16px; background:none; border:none; font-size:1.5rem; color:var(--text-muted); cursor:pointer;">&times;</button>
      <h2 id="modalTitle" style="margin-bottom:20px; font-family:var(--font-display); font-size:1.2rem;">Thêm sản phẩm mới</h2>
      
      <form id="productForm">
        <input type="hidden" id="editCode" value="">
        
        <div class="form-group" style="margin-bottom:14px;">
          <label style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:6px;">Tên sản phẩm</label>
          <input type="text" id="pName" class="form-control" required style="width:100%; padding:10px; border-radius:var(--radius-md); border:1px solid var(--border);">
        </div>
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:14px;">
           <div>
              <label style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:6px;">Mã SP</label>
              <input type="text" id="pCode" class="form-control" required style="width:100%; padding:10px; border-radius:var(--radius-md); border:1px solid var(--border);">
           </div>
           <div>
              <label style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:6px;">Thương hiệu</label>
              <input type="text" id="pBrand" class="form-control" required style="width:100%; padding:10px; border-radius:var(--radius-md); border:1px solid var(--border);">
           </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:14px;">
           <div>
              <label style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:6px;">Danh mục</label>
              <select id="pCat" class="form-control" style="width:100%; padding:10px; border-radius:var(--radius-md); border:1px solid var(--border);">
                <option>Giảm đau, hạ sốt</option>
                <option>Vitamin & Khoáng chất</option>
                <option>Kháng sinh</option>
                <option>Tiêu hóa</option>
                <option>Dị ứng</option>
                <option>Tim mạch</option>
                <option>Thuốc xịt mũi</option>
                <option>Cảm cúm</option>
                <option>Thuốc không kê đơn</option>
              </select>
           </div>
           <div>
              <label style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:6px;">Giá bán (VND)</label>
              <input type="number" id="pPrice" class="form-control" required style="width:100%; padding:10px; border-radius:var(--radius-md); border:1px solid var(--border);">
           </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:24px;">
           <div>
              <label style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:6px;">Tồn kho</label>
              <input type="number" id="pStock" class="form-control" required style="width:100%; padding:10px; border-radius:var(--radius-md); border:1px solid var(--border);">
           </div>
           <div>
              <label style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:6px;">Tối thiểu</label>
              <input type="number" id="pMin" class="form-control" required style="width:100%; padding:10px; border-radius:var(--radius-md); border:1px solid var(--border);">
           </div>
           <div>
              <label style="display:block; font-size:0.85rem; font-weight:600; margin-bottom:6px;">Hạn sử dụng</label>
              <input type="date" id="pExpiry" class="form-control" required style="width:100%; padding:10px; border-radius:var(--radius-md); border:1px solid var(--border);">
           </div>
        </div>

        <div style="display:flex; justify-content:flex-end; gap:10px;">
           <button type="button" onclick="closeModal()" class="btn btn-ghost">Hủy</button>
           <button type="submit" class="btn btn-primary">Lưu sản phẩm</button>
        </div>
      </form>
    </div>
  </div>
  <div class="help-btn"><i class="fa-solid fa-question"></i></div>
  <script src="../../js/admin-component.js"></script>
  <script src="../../js/admin/products.js"></script>
</body>
</html>
